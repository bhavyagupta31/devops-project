name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-docker-app .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-docker-app

      - name: Run Container (Deployment)
        run: |
          docker run -d -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/my-docker-app
